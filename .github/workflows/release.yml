name: release

# Tag pushes (v*) build and publish a Windows installer to a GitHub Release;
# workflow_dispatch runs the same build without publishing, for testing the
# packaging step on its own.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # electron-builder occasionally hits a transient Windows file-lock race
      # while staging Electron's prebuilt binary (EPERM renaming
      # release/win-unpacked.tmp) — reproduced consistently on one dev
      # machine even with a Defender exclusion and elevated privileges, so
      # it isn't reliably one single cause. A few retries is the common
      # mitigation; GitHub's hosted Windows runners are clean VMs and may
      # not hit this at all, but the retry costs nothing when it doesn't.
      - name: Build Windows installer
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Build attempt $attempt of $maxAttempts"
            Remove-Item -Recurse -Force release -ErrorAction SilentlyContinue
            npm run dist:win
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Start-Sleep -Seconds 5
          }
          exit 1
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
